<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Styled To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<ul class="todo-list">

  <li>
    <input type="checkbox" id="task1">
    <label for="task1">Buy groceries</label>
    <ul class="sub-item">
      <li><a class="sub-item-link" href="https://www.walmart.com" target="_blank">Walmart</a></li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task2">
    <label for="task2">Read a book</label>
    <ul class="sub-item">
      <li><a class="sub-item-link" href="https://www.goodreads.com" target="_blank">Goodreads</a></li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task3">
    <label for="task3">Exercise for 30 minutes</label>
    <ul class="sub-item">
      <li><a class="sub-item-link" href="https://www.youtube.com/results?search_query=workout" target="_blank">YouTube Workouts</a></li>
    </ul>
  </li>

  <li>
    <input type="checkbox" id="task4">
    <label for="task4">Learn something new</label>
    <ul class="sub-item">
      <li><a class="sub-item-link" href="https://www.coursera.org" target="_blank">Coursera</a></li>
    </ul>
  </li>

</ul>
</body>
</html>
